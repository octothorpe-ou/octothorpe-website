<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Supplies - Sealed Message</title>
    <meta name="description" content="You received a time-locked message. Install Supplies to read it.">
    <meta property="og:title" content="Supplies - Sealed Message">
    <meta property="og:description" content="You received a time-locked message. Install Supplies to read it.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            color: #1d1d1f;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-text-size-adjust: 100%;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .countdown {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #e67e00;
            margin-bottom: 0.25rem;
            letter-spacing: 0.02em;
        }

        .countdown.ready {
            color: #34c759;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #86868b;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            background: #007aff;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.85rem 1.75rem;
            border-radius: 14px;
            width: 100%;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .cta:active {
            background: #0062cc;
        }

        .cta svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .error-card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .error-body {
            font-size: 0.9rem;
            color: #86868b;
            line-height: 1.5;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #aeaeb2;
        }

        footer a {
            color: #aeaeb2;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="message" class="card" hidden>
        <div class="lock-icon" id="icon"></div>
        <div class="status" id="status"></div>
        <div class="countdown" id="countdown"></div>
        <div class="subtitle" id="subtitle"></div>
        <a class="cta" id="cta" href="/supplies/get">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Get Supplies
        </a>
    </div>

    <div id="error" class="error-card" hidden>
        <div class="error-icon">?</div>
        <div class="error-title">Invalid message link</div>
        <div class="error-body">This link doesn't contain a valid Supplies message. It may have been truncated or corrupted.</div>
    </div>

    <footer>
        <a href="https://octothorpe.ee">Octothorpe OU</a>
    </footer>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var ts = params.get("t");

            if (!ts) {
                document.getElementById("error").hidden = false;
                return;
            }

            var unlockMs = parseInt(ts, 10) * 1000;

            if (isNaN(unlockMs)) {
                document.getElementById("error").hidden = false;
                return;
            }
            var card = document.getElementById("message");
            var icon = document.getElementById("icon");
            var status = document.getElementById("status");
            var countdown = document.getElementById("countdown");
            var subtitle = document.getElementById("subtitle");

            card.hidden = false;

            function formatRemaining(ms) {
                var s = Math.floor(ms / 1000);
                var d = Math.floor(s / 86400);
                s %= 86400;
                var h = Math.floor(s / 3600);
                s %= 3600;
                var m = Math.floor(s / 60);
                s %= 60;

                var parts = [];
                if (d > 0) parts.push(d + "d");
                if (h > 0) parts.push(h + "h");
                if (m > 0) parts.push(m + "m");
                if (parts.length < 2) parts.push(s + "s");
                return parts.slice(0, 2).join(" ");
            }

            function render() {
                var remaining = unlockMs - Date.now();

                if (remaining <= 0) {
                    icon.textContent = "\uD83D\uDD13";
                    status.textContent = "Message ready";
                    countdown.textContent = "";
                    countdown.className = "countdown ready";
                    subtitle.textContent = "Open this message in Supplies to read it.";
                } else {
                    icon.textContent = "\uD83D\uDD12";
                    status.textContent = "Message sealed";
                    countdown.textContent = formatRemaining(remaining);
                    countdown.className = "countdown";
                    subtitle.textContent = "This message will unlock " + new Date(unlockMs).toLocaleString() + ".";
                }
            }

            render();
            setInterval(render, 1000);
        })();
    </script>
</body>
</html>
