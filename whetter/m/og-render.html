<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1260px;
            height: 1260px;
            background: #f2f2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }
        .icon {
            width: 180px;
            height: 180px;
            border-radius: 40px;
            margin-bottom: 32px;
        }
        .title {
            font-size: 56px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 36px;
            color: #86868b;
            margin-bottom: 24px;
        }
        .domain {
            font-size: 28px;
            color: #aeaeb2;
        }
    </style>
</head>
<body>
    <img class="icon" src="app-icon.svg" alt="Whetter">
    <div class="title">Sealed Message from Whetter</div>
    <div class="subtitle">Time-locked for your eyes only.</div>
    <div class="domain">octothorpe.ee</div>
</body>
</html>
